<header class="top-header">
  <div class="user-status">Usted no se ha identificado</div>
</header>

<div class="main-bar">
  <div class="app-logo-section">
    <img src="img/logocorto.png" alt="Logo Cementerio" class="main-logo" />
    <span>CEMENTERIO DIGITAL</span>
  </div>

  <nav class="main-nav">
    <span class="language-selector">ESPAÑOL-INTERNACIONAL (ESI)</span>
  </nav>
</div>

<div class="main-container">
  <div class="login-wrapper">
    <div class="login-box">
      <div class="logo-container">
        <img src="img/LogoAlcaldia%20(1).png" alt="Logo Alcaldía" class="alcaldia-logo" />
      </div>

      <form (ngSubmit)="onLogin()">
        <div class="form-group">
          <label class="input-label">Ingrese su correo</label>
          <input 
            type="email" 
            name="correo" 
            [(ngModel)]="correo" 
            placeholder="Correo electrónico" 
            required />
        </div>
        <div class="form-group">
          <label class="input-label">Ingrese su contraseña</label>
          <div class="pass-input-container">
            <input 
              [type]="verPassword ? 'text' : 'password'" 
              name="contrasena" 
              [(ngModel)]="contrasena" 
              placeholder="Contraseña" 
              required />
            <span class="eye-toggle" (click)="verPassword = !verPassword">
              <!-- Eye Icon -->
              <svg *ngIf="!verPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
              <!-- Eye-off Icon -->
              <svg *ngIf="verPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
            </span>
          </div>
        </div>

        <div class="form-options">
          <input 
            type="checkbox" 
            id="rememberUser" 
            name="rememberMe" 
            [(ngModel)]="rememberMe" 
          />
          <label for="rememberUser">Recordar usuario</label>
        </div>

        <button type="submit" class="btn-acceder" [disabled]="cargando">
          {{ cargando ? 'ACCEDIENDO...' : 'ACCEDER' }}
        </button>

        <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>
      </form>
    </div>
  </div>
</div>

<footer class="app-footer">
  <p>&copy; 2026 Alcaldía La Libertad Este. Todos los derechos reservados.</p>
</footer>
